<html>
    <head>


        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
        <link rel="stylesheet" href="./styles.css"></link>
        <script src="./main.js"></script>
        <title>Responsive Header + mobile Project</title>
    </head>

    <body class="bg-blue-50">

        <div class="bg-blue-950 py-5">
            <nav id="nav" x-data="headerData" class="px-4 py-5">

                <div @click.away="mobileNavOpen = false" class="flex sm:hidden gap-5" x-cloak>

                    <div id="logo" class="text-4xl text-nowrap text-white" font-family="JetBrains Mono, Fira Code, monospace">&lt; j0e1<span class="text-blue-400 size-5 select-none">.dev </span>/&gt;</div>

                    <button  @click="mobileNavOpen = !mobileNavOpen" class="absolute right-4 hover:scale-150 transition-all">
                        <!-- burger icon for opening mobile menu -->
                        <svg x-show="!mobileNavOpen" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="white" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                        </svg>

                        <!-- x icon for closing mobile menu -->
                        <svg x-show="mobileNavOpen" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="white" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                        </svg>
                    </button>

                </div>


                <!-- Mobile Navigation -->
                 <!-- Really need to add a smooth transition to this element maybe by toggling a class called fade in and fade out? will have to look into it  -->
                 <div x-show="mobileNavOpen" class="absolute text-white bg-blue-950  rounded-2xl sm:hidden items-center justify-center " style="padding: 25px;"x-cloak :class="{ 'slideDown' :  mobileNavOpen }" :aria-expanded="mobileNavOpen">
                    <template x-for="link in links" :key="link.name">
                        <a :aria-expanded="mobileNavOpen" aria-controls="nav" :href="link.href" class="block border-black hover:bg-blue-200 px-4 text-nowrap hover:text-black transition-colors duration-500 rounded-2xl" x-text="link.name" target="_blank" rel="noopener noreferrer"></a>
                    </template>
                </div>

                <!-- Desktop Navigation -->
                <div class="text-white hidden sm:flex gap-x-4 items-center">
                     <div id="logo" class="text-4xl text-nowrap" font-family="JetBrains Mono, Fira Code, monospace">&lt; j0e1<span class="text-purple-400 size-5 select-none">.dev </span>/&gt;</div>

                    <template x-for="link in links" :key="link.name" >
                        <a aria-controls="nav"  :href="link.href" class="block underline text-gray-200 hover:bg-black hover:no-underline rounded-3xl hover:px-4 hover:py-1 transition-all" x-text="link.name" target="_blank" rel="noopener noreferrer"></a>
                    </template>
                </div>
            </nav>

        </div>
    </body>
</html>

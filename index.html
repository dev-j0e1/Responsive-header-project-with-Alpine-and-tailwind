<html>
    <head>


        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
        <link rel="stylesheet" href="./styles.css"></link>
        <script src="./main.js"></script>
        <title>Responsive Header + mobile Project</title>
    </head>

    <body class="bg-blue-50">

        <div class="bg-blue-950 py-5">
            <nav id="nav" x-data="headerData" class="px-4 py-5">

                <div @click.away="mobileNavOpen = false" class="flex sm:hidden gap-5" x-cloak>

                    <div id="logo" class="text-4xl text-nowrap text-white" font-family="JetBrains Mono, Fira Code, monospace">&lt; j0e1<span class="text-blue-400 size-5 select-none">.dev </span>/&gt;</div>

                    <button  @click="mobileNavOpen = !mobileNavOpen" class="absolute right-4 hover:scale-150 transition-all">
                        <!-- burger icon for opening mobile menu -->
                        <svg x-show="!mobileNavOpen" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="white" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                        </svg>

                        <!-- x icon for closing mobile menu -->
                        <svg x-show="mobileNavOpen" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="white" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                        </svg>
                    </button>

                </div>


                <!-- Mobile Navigation -->
                 <!-- TODO: Make sure that the mobile actually has the right nav testing with different screen sizes, make sure everything looks the way it should! -->
                 <div x-show="mobileNavOpen" class="absolute text-white bg-blue-950  rounded-2xl sm:hidden items-center justify-center " style="padding: 25px;"x-cloak :class="{ 'slideDown' :  mobileNavOpen }" :aria-expanded="mobileNavOpen">
                    <template x-for="link in links" :key="link.name">
                        <a :aria-expanded="mobileNavOpen" aria-controls="nav" :href="link.href" class="block border-black hover:bg-blue-200 px-4 text-nowrap hover:text-black transition-colors duration-500 rounded-2xl" x-text="link.name" target="_blank" rel="noopener noreferrer"></a>
                    </template>
                </div>

                <!-- Desktop Navigation -->
                <div class="text-white hidden sm:flex gap-x-4 items-center">
                     <div id="logo" class="text-4xl text-nowrap" font-family="JetBrains Mono, Fira Code, monospace">&lt; j0e1<span class="text-purple-400 size-5 select-none">.dev </span>/&gt;</div>

                    <template x-for="link in links" :key="link.name" >
                        <a aria-controls="nav"  :href="link.href" class="block underline text-gray-200 hover:bg-black hover:no-underline rounded-3xl hover:px-4 hover:py-1 transition-all" x-text="link.name" target="_blank" rel="noopener noreferrer"></a>
                    </template>
                </div>
            </nav>
        </div>

        <div x-data="loginData" x-init="$watch('rememberMe', value => localStorage.rememberMe = JSON.stringify(value)); $watch('email', ()=>validate()); $watch('password', ()=>validate())">

            <form class="grid justify-center gap-3" @submit.prevent="localStorage.setItem('savedEmail', email)"> 

                <div id="email-container" class="grid">
                    <label>Email</label>
                    <input id="email-input" type="email" class="border-2 border-gray-400 login-input" style="width: 60vw"  :value="email" x-model="email"></input>
                </div>

                <div id="password-container" class="grid">
                    <label>Password</label>
                    <div class="flex">
                        <input x-ref="password" :type="showPassword ? 'text' : 'password'" id="password-input" x-model="password" class="border-2 border-gray-400 login-input" style="width: 60vw"></input>
                        <button id="show-password"  style="width: fit-content; padding: 3px;margin-top: 2px;" @click="showPassword = !showPassword" >
                            <svg x-show="!showPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                            </svg>
                            <svg x-show="showPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div id="rememberMe-container" class="flex gap-2">
                     <input type="checkbox" id="rememberMe-checkbox" x-model="rememberMe"></input><label>Remember Me</label>
                </div>

                <button class="px-4 py-2 font-semibold text-white bg-blue-600 rounded-lg shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-75"
                     id="signIn-button" type="submit" @click="login(email, $refs.password.value)" style="width: fit-content" x-ref="login" :disabled="!canLogin">Log In</button>


            </form>

            <div id="login-result-modal" x-ref="popup" hidden>

                <button id="exit-login-modal" @click="$refs.popup.hidden = true">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                    </svg>
                </button>
                <span id="login-result-text"></span>
            </div>

        </div>

    </body>
</html>
